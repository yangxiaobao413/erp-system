services:
  - type: web
    name: erp-backend
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_NAME
        value: ERP System
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        value: 6RYyZkAK2p5j7cICJWerqHmEhlvMFfN0LoSOXuGQUxB9iT1DgPn4btaVz38dsw
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: LOW_STOCK_THRESHOLD
        value: "10"
      - key: DATABASE_URL
        fromDatabase:
          name: erp-db
          property: connectionString
      - key: DATABASE_URL_SYNC
        fromDatabase:
          name: erp-db
          property: connectionString

databases:
  - name: erp-db
    plan: free
